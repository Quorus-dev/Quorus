[project]
name = "quorus-cli"
version = "0.4.0"
description = "Quorus CLI — coordination layer for AI agent swarms"
requires-python = ">=3.10"
license = "MIT"
authors = [
    {name = "Arav Kekane", email = "aravkekane@gmail.com"},
    {name = "Aarya"},
]
readme = "README.md"
keywords = ["ai", "agents", "coordination", "multi-agent", "swarm", "cli"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Communications :: Chat",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "httpx>=0.27.0",
    "rich>=13.0.0",
]

[project.urls]
Homepage = "https://quorus.dev"
Repository = "https://github.com/Aarya2004/quorus"
Issues = "https://github.com/Aarya2004/quorus/issues"

[tool.hatch.build.targets.wheel]
packages = ["quorus_cli"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
