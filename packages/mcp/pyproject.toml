[project]
name = "quorus-mcp"
version = "0.4.0"
description = "Quorus MCP server — exposes inter-agent coordination tools to MCP-compatible clients like Claude Code"
requires-python = ">=3.10"
license = "MIT"
authors = [
    {name = "Arav Kekane", email = "aravkekane@gmail.com"},
    {name = "Aarya"},
]
readme = "README.md"
keywords = ["ai", "agents", "coordination", "mcp", "multi-agent", "swarm"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Communications :: Chat",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "httpx>=0.27.0",
    "mcp>=1.2.0",
]

[project.urls]
Homepage = "https://quorus.dev"
Repository = "https://github.com/Quorus-dev/Quorus"
Issues = "https://github.com/Quorus-dev/Quorus/issues"

[tool.hatch.build.targets.wheel]
packages = ["quorus_mcp"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
