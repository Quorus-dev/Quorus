services:
  relay:
    build: .
    ports:
      - "${PORT:-8080}:8080"
    environment:
      RELAY_SECRET: ${RELAY_SECRET:-}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://quorus:quorus@postgres:5432/quorus}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required for JWT signing (min 32 chars)}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS:-86400}
      BOOTSTRAP_SECRET: ${BOOTSTRAP_SECRET:?BOOTSTRAP_SECRET is required for initial tenant creation}
      PORT: ${PORT:-8080}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Enable transactional outbox for at-least-once delivery (requires migration 006)
      USE_OUTBOX: ${USE_OUTBOX:-false}
      MAX_MESSAGES: ${MAX_MESSAGES:-1000}
      MESSAGE_TTL_SECONDS: ${MESSAGE_TTL_SECONDS:-86400}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-60}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-60}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: quorus
      POSTGRES_USER: quorus
      # Change this password in production!
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quorus}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quorus"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
