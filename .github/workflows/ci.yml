name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run ruff
        run: uvx ruff check .

  test:
    name: Tests / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv pip install --system -e ".[test]"

      - name: Run tests (skip integration)
        run: pytest -q -m "not integration" --tb=short
        env:
          RELAY_SECRET: test-secret
          JWT_SECRET: test-jwt-secret-that-is-at-least-32-chars
          BOOTSTRAP_SECRET: test-bootstrap-secret-32-chars-min
          PYTHONWARNINGS: default

  install-topology:
    # Sentinel job — runs the regression tests for the Apr 23 2026 hackathon
    # cold-install bug across every Python we support, using the *exact* path
    # ./setup.sh recommends (stdlib `python -m venv`, NOT `uv venv`). If this
    # job is red, the project will not install cleanly for end users — block
    # the merge. See docs/HACKATHON_REGRESSION.md for context.
    name: Install topology / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Provision venv via setup.sh --install
        run: |
          chmod +x ./setup.sh
          ./setup.sh --install "$(which python${{ matrix.python-version }})"

      - name: Run install-topology tests
        run: ./.venv/bin/python -m pytest tests/test_install_topology.py -v --tb=short
        env:
          RELAY_SECRET: test-secret
          JWT_SECRET: test-jwt-secret-that-is-at-least-32-chars
          BOOTSTRAP_SECRET: test-bootstrap-secret-32-chars-min

  test-redis:
    name: Tests (Redis integration)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv pip install --system -e ".[test]"

      - name: Run Redis integration tests
        run: pytest tests/test_redis_integration.py -v --tb=short
        env:
          RELAY_SECRET: test-secret
          JWT_SECRET: test-jwt-secret-that-is-at-least-32-chars
          BOOTSTRAP_SECRET: test-bootstrap-secret-32-chars-min
          REDIS_URL: redis://localhost:6379
          PYTHONWARNINGS: default

  test-postgres:
    name: Tests (Postgres integration)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: quorus
          POSTGRES_PASSWORD: quorus
          POSTGRES_DB: quorus_test
        options: >-
          --health-cmd "pg_isready -U quorus"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv pip install --system -e ".[test]"

      - name: Run Postgres integration tests
        run: pytest tests/test_postgres_integration.py -v --tb=short
        env:
          RELAY_SECRET: test-secret
          JWT_SECRET: test-jwt-secret-that-is-at-least-32-chars
          BOOTSTRAP_SECRET: test-bootstrap-secret-32-chars-min
          DATABASE_URL: postgresql+asyncpg://quorus:quorus@localhost:5432/quorus_test
          PYTHONWARNINGS: default

  website:
    name: Website (Vite lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: "website/.nvmrc"

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint

      - name: Build
        run: npm run build
