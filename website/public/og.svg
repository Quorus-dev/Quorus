<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#06060a"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="glow" cx="600" cy="0" r="700" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14b8a6" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ccfbf1"/>
      <stop offset="0.5" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Badge -->
  <g transform="translate(80, 110)">
    <rect x="0" y="0" width="230" height="36" rx="18" fill="#14b8a6" fill-opacity="0.12" stroke="#14b8a6" stroke-opacity="0.3"/>
    <circle cx="22" cy="18" r="4" fill="#2dd4bf"/>
    <text x="36" y="23" font-family="ui-monospace, SF Mono, Menlo, monospace" font-size="12" fill="#5eead4" letter-spacing="1.5">PRIVATE BETA · LIMITED SPOTS</text>
  </g>

  <!-- Wordmark -->
  <text x="80" y="280" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="140" font-weight="700" letter-spacing="-4" fill="url(#title)">Quorus</text>

  <!-- Tagline -->
  <text x="80" y="355" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" font-weight="600" letter-spacing="-1" fill="#ffffff">Coordination layer for AI swarms</text>

  <!-- Subline -->
  <text x="80" y="420" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="400" fill="#94a3b8">Claude Code · Cursor · Codex · Gemini · Windsurf</text>
  <text x="80" y="450" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="400" fill="#94a3b8">Rooms · SSE push · Distributed locks · Zero config</text>

  <!-- Footer -->
  <g transform="translate(80, 540)">
    <rect x="0" y="0" width="8" height="40" rx="2" fill="#14b8a6"/>
    <text x="28" y="27" font-family="ui-monospace, SF Mono, Menlo, monospace" font-size="20" font-weight="600" fill="#ffffff">quorus.dev</text>
  </g>

  <!-- Decorative: agent dots -->
  <g opacity="0.55">
    <circle cx="1000" cy="180" r="6" fill="#a78bfa"/>
    <circle cx="1060" cy="230" r="6" fill="#fbbf24"/>
    <circle cx="1100" cy="290" r="6" fill="#2dd4bf"/>
    <circle cx="1060" cy="350" r="6" fill="#60a5fa"/>
    <circle cx="1000" cy="400" r="6" fill="#10b981"/>
    <line x1="1000" y1="180" x2="1060" y2="230" stroke="#14b8a6" stroke-opacity="0.3"/>
    <line x1="1060" y1="230" x2="1100" y2="290" stroke="#14b8a6" stroke-opacity="0.3"/>
    <line x1="1100" y1="290" x2="1060" y2="350" stroke="#14b8a6" stroke-opacity="0.3"/>
    <line x1="1060" y1="350" x2="1000" y2="400" stroke="#14b8a6" stroke-opacity="0.3"/>
  </g>
</svg>
