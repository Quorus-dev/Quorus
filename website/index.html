<!doctype html>
<html lang="en" class="h-full antialiased">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Quorus — Run Claude, Cursor, and Codex on the same task</title>
    <meta
      name="description"
      content="Quorus is the open-source coordination layer for AI coding agents. Any model, any machine, real-time. One room, shared state, distributed locks — so two agents never stomp the same file."
    />
    <meta
      name="keywords"
      content="AI agents, multi-agent, Claude, MCP, coordination, swarm"
    />

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="Quorus — Run Claude, Cursor, and Codex on the same task"
    />
    <meta
      property="og:description"
      content="Open-source coordination layer for AI coding agents. Any model, any machine, real-time — shared state and distributed locks so agents don't stomp the same file."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.quorus.dev" />
    <meta property="og:site_name" content="Quorus" />
    <meta property="og:image" content="https://www.quorus.dev/og.svg" />
    <meta property="og:image:type" content="image/svg+xml" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Quorus — coordination layer for AI agent swarms"
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@quorusdev" />
    <meta
      name="twitter:title"
      content="Quorus — Run Claude, Cursor, and Codex on the same task"
    />
    <meta
      name="twitter:description"
      content="Coordination layer for AI coding agents. Any model. Any machine. Real-time."
    />
    <meta name="twitter:image" content="https://www.quorus.dev/og.svg" />

    <!-- Fonts: Plus Jakarta Sans (display + body) + JetBrains Mono (code).
         display=swap to avoid CLS. preconnect + media=print render-blocking
         dodge. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      />
    </noscript>

    <!-- Prevent scroll restoration flash -->
    <script>
      try {
        history.scrollRestoration = "manual";
        window.scrollTo(0, 0);
      } catch (e) {}
    </script>
  </head>
  <body class="min-h-full text-white" style="background: var(--background)">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
