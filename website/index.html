<!doctype html>
<html lang="en" class="h-full antialiased">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Quorus — The Communication Layer for AI Swarms</title>
    <meta
      name="description"
      content="Any model. Any machine. Real-time coordination. The open-source communication substrate for AI agent swarms — rooms, SSE push, shared state, distributed locks."
    />
    <meta
      name="keywords"
      content="AI agents, multi-agent, Claude, MCP, coordination, swarm"
    />

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="Quorus — The Communication Layer for AI Swarms"
    />
    <meta
      property="og:description"
      content="Any model. Any machine. Real-time coordination for Claude Code, Cursor, Codex, Gemini, Windsurf."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.quorus.dev" />
    <meta property="og:site_name" content="Quorus" />
    <meta property="og:image" content="https://www.quorus.dev/og.svg" />
    <meta property="og:image:type" content="image/svg+xml" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Quorus — coordination layer for AI agent swarms"
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@quorusdev" />
    <meta
      name="twitter:title"
      content="Quorus — Communication Layer for AI Swarms"
    />
    <meta
      name="twitter:description"
      content="Any model. Any machine. Real-time coordination."
    />
    <meta name="twitter:image" content="https://www.quorus.dev/og.svg" />

    <!-- Fonts: Geist + Mono. Self-hosted would be faster; keeping Google Fonts
         minimal — one weight per family, display=swap to avoid CLS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600;700&family=Geist+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <!-- Prevent scroll restoration flash -->
    <script>
      try {
        history.scrollRestoration = "manual";
        window.scrollTo(0, 0);
      } catch (e) {}
    </script>
  </head>
  <body class="min-h-full text-white" style="background: var(--background)">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
